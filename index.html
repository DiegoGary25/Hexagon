<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HEX//ARC</title>
  <link rel="preload" href="Fonts/GT-Pressura-Standard-Regular.woff2?v=2" as="font" type="font/woff2" crossorigin>
